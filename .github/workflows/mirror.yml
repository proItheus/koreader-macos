name: Mirror KOReader

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mirror mode'
        required: true
        type: choice
        options:
          - nightly
          - tagged
      tag:
        description: 'Upstream tag (tagged mode only)'
        required: false
        type: string

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    env:
      GH_TOKEN: ${{ secrets.KOREADER_PAT }}

    steps:
      - name: Validate KOREADER_PAT secret
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::KOREADER_PAT secret is not set."
            echo "Create a fine-grained PAT with 'actions: read' on koreader/koreader,"
            echo "then add it as a repository secret named KOREADER_PAT."
            exit 1
          fi
          gh auth status

      # ── resolve upstream CI run ──────────────────────────────────────

      - name: Resolve CI run
        id: resolve
        run: |
          MODE="${{ inputs.mode }}"
          TAG="${{ inputs.tag }}"

          if [ "$MODE" = "tagged" ]; then
            BRANCH="$TAG"
            RELEASE_TAG="koreader-${TAG}"
            PRERELEASE="false"
          else
            BRANCH="master"
            RELEASE_TAG="koreader-nightly"
            PRERELEASE="true"
          fi

          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}"   >> "$GITHUB_OUTPUT"

          RUN_ID=$(gh api \
            "repos/koreader/koreader/actions/workflows/4070926/runs?branch=${BRANCH}&status=success&event=push&per_page=1" \
            --jq '.workflow_runs[0].id // empty')

          if [ -z "$RUN_ID" ]; then
            echo "ERROR: no successful CI run found for branch=${BRANCH}" >&2
            exit 1
          fi
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"

      # ── check artifact expiry ────────────────────────────────────────

      - name: Check artifact expiry
        run: |
          RUN_ID="${{ steps.resolve.outputs.run_id }}"

          STATS=$(gh api "repos/koreader/koreader/actions/runs/${RUN_ID}/artifacts" \
            --jq '[.artifacts[] | select(.name | test("macos"; "i"))] |
                  { total: length, expired: [.[] | select(.expired == true)] | length }')

          TOTAL=$(echo "$STATS" | jq .total)
          EXPIRED=$(echo "$STATS" | jq .expired)

          echo "macOS artifacts: ${TOTAL} total, ${EXPIRED} expired"

          if [ "$TOTAL" -eq 0 ]; then
            echo "ERROR: no macOS artifacts found for run ${RUN_ID}" >&2
            exit 1
          fi

          if [ "$EXPIRED" -eq "$TOTAL" ]; then
            echo "ERROR: all ${TOTAL} macOS artifacts have expired (GitHub Actions retains them 90 days)."
            echo "The tag may be too old to mirror — rebuild from source or use a nightly snapshot."
            exit 1
          fi

      # ── skip already-mirrored tagged releases ────────────────────────

      - name: Skip if already mirrored (tagged)
        if: inputs.mode == 'tagged'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.resolve.outputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" --json tagName &>/dev/null; then
            echo "Release $RELEASE_TAG already mirrored — nothing to do."
            exit 78
          fi

      # ── download artifacts ───────────────────────────────────────────

      - name: Download artifacts
        run: |
          RUN_ID="${{ steps.resolve.outputs.run_id }}"

          rm -rf artifacts dist
          mkdir -p artifacts dist

          gh run download "$RUN_ID" -R koreader/koreader \
            -p "*ARM64*"  -D artifacts/arm64

          gh run download "$RUN_ID" -R koreader/koreader \
            -p "*x86-64*" -D artifacts/x86_64

          echo '=== downloaded files ==='
          find artifacts -type f

      # ── rename & hash ────────────────────────────────────────────────

      - name: Rename and hash
        id: hash
        run: |
          set -ex

          for arch in arm64 x86_64; do
            SRC=$(echo artifacts/${arch}/*.7z)
            DST="dist/koreader-macos-${arch}.7z"
            cp "$SRC" "$DST"

            NIX_HASH=$(python3 -c "
          import hashlib, base64
          h = hashlib.sha256()
          with open('${DST}', 'rb') as f:
              while b := f.read(8192): h.update(b)
          print('sha256-' + base64.b64encode(h.digest()).decode())
          ")
            CASK_HASH=$(shasum -a 256 "$DST" | cut -d' ' -f1)

            echo "${arch}_nix_hash=${NIX_HASH}"   >> "$GITHUB_OUTPUT"
            echo "${arch}_cask_hash=${CASK_HASH}" >> "$GITHUB_OUTPUT"
          done

      # ── publish release ──────────────────────────────────────────────

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.resolve.outputs.release_tag }}
          PRERELEASE: ${{ steps.resolve.outputs.prerelease }}
        run: |
          MODE="${{ inputs.mode }}"
          VERSION="${{ inputs.tag }}"

          if [ "$MODE" = "nightly" ]; then
            TITLE="KOReader macOS — nightly"
            NOTES="Mirrored from koreader/koreader CI (master)."
          else
            TITLE="KOReader macOS ${VERSION}"
            NOTES="Mirrored from koreader/koreader ${VERSION}."
          fi

          if gh release view "$TAG" &>/dev/null; then
            echo "Updating existing release ${TAG}..."
            gh release upload "$TAG" dist/*.7z --clobber
            gh release edit "$TAG" --title "$TITLE" --notes "$NOTES" --prerelease="$PRERELEASE"
          else
            gh release create "$TAG" dist/*.7z \
              --title "$TITLE" \
              --notes "$NOTES" \
              --prerelease="$PRERELEASE"
          fi

      # ── dispatch nix/cask update ─────────────────────────────────────

      - name: Dispatch source update
        run: |
          gh workflow run update-sources.yml \
            -f mode="${{ inputs.mode }}" \
            -f release_tag="${{ steps.resolve.outputs.release_tag }}" \
            -f version="${{ inputs.tag }}" \
            -f arm64_nix_hash="${{ steps.hash.outputs.arm64_nix_hash }}" \
            -f x86_64_nix_hash="${{ steps.hash.outputs.x86_64_nix_hash }}" \
            -f arm64_cask_hash="${{ steps.hash.outputs.arm64_cask_hash }}" \
            -f x86_64_cask_hash="${{ steps.hash.outputs.x86_64_cask_hash }}"
        env:
          GH_TOKEN: ${{ github.token }}
